<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Register Page</title>
    <link rel="stylesheet" href="loginregisterstyles.css">
</head>
<body>
    <form action="register.php" method="post">
        <table>
            <tr>
                <th>Register</th>
            </tr>
            <tr>
                <td>
                    <input class="entry" type="text" name="username" id="username" placeholder="Username" required>
                </td>       
            </tr>
            <tr>
                <td>
                    <input class="entry" type="password" name="password" id="password" placeholder="Password" required>
                </td>     
            </tr>
            <tr>
                <td>
                     <input class="entry" type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
                </td>
            </tr>
            <tr>
                <td>
                    <button class="register-box" type="submit" value="Register">Register</button>
                </td>
            </tr>
            <tr>
                <td>
                    <a class="login-box" href="loginpage.html">Back to Login</a>
                </td>
            </tr>
        </table>
    </form>
</body>
