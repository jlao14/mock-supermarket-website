<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="loginregisterstyles.css">
</head>
<body>
    <form action="login.php" method="post">
        <table>
            <tr>
                <th>Login</th>
            </tr>
            <tr>
                <td>
                    <input class="entry" type="text" name="username" id="username" placeholder="Username" required>
                </td>       
            </tr>
            <tr>
                <td>
                    <input class="entry" type="password" name="password" id="password" placeholder="Password" required>
                </td>     
            </tr>
            <tr>
                <td>
                    <button class="login-box" type="submit" value="Login">Login</button>
                </td>
            </tr>
            <tr>
                <td>
                    <a class="register-box" href="registerpage.html">Register</a>
                </td>
            </tr>
        </table>
    </form>
</body>
